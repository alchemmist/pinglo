---
name: fmt-check
on:
  push:
    branches: [main]
  pull_request:
jobs:
  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install shfmt
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.10.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Format Check
        run: make fmt-check
